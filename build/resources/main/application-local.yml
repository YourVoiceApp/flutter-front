# 로컬 전용 (Gradle -Pdeploy / Docker 빌드 시 JAR 에 포함되지 않음)

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/yourvoice?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

auth:
  email-verification:
    expiration-seconds: ${EMAIL_VERIFICATION_EXPIRATION_SECONDS:300}
    from-address: ${EMAIL_VERIFICATION_FROM_ADDRESS:${SPRING_MAIL_USERNAME:no-reply@yourvoiceback.local}}

supertone:
  api:
    base-url: ${SUPERTONE_API_BASE_URL:https://supertoneapi.com}
    key: ${SUPERTONE_API_KEY:558145023bd12873c9cd03f85cd3fb6b}
